<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    .notfound-wrap {
      min-height: 100vh;

      font-family: 'Montserrat', sans-serif;
      font-size: clamp(6rem, 20vw, 12rem);

      color: var(--forest);

      user-select: none;
      margin-bottom: -1rem;
    }
    .notfound-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .notfound-wrap h1 {

      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--forest);
      margin: 0 0 .75rem;
    }
    .notfound-wrap p {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.6;
      margin: 0 auto 2rem;
    }
    .notfound-actions {
